<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Próximamente</title>

<meta name="description" content="Algo único está en camino">
<link rel="icon" href="logo.webp">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#fff;
  height:100vh;
  overflow:hidden;
  animation:fadeBody 1s ease;
}

@keyframes fadeBody{from{opacity:0}to{opacity:1}}

.bg{
  position:fixed;
  inset:0;
  background:url('fondo.jpg') center/cover no-repeat;
  transform:scale(1.15);
  animation:zoom 30s ease-in-out infinite alternate;
}

@keyframes zoom{from{transform:scale(1.15)}to{transform:scale(1.3)}}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,0,0,.3), rgba(0,0,0,.95));
  backdrop-filter:blur(10px);
}

canvas{
  position:fixed;
  inset:0;
  z-index:1;
}

.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1}}

.logo{
  width:220px;
  margin-bottom:30px;
  filter:drop-shadow(0 20px 40px rgba(255,255,255,.2));
}

h2{
  letter-spacing:10px;
  font-weight:200;
  margin-bottom:20px;
}

p{opacity:.85;margin-bottom:30px}

.countdown{margin-bottom:30px;letter-spacing:3px}

.form{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

input{
  padding:16px 20px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:#fff;
  min-width:260px;
  backdrop-filter:blur(12px);
  transition:.3s;
}

input:focus{
  outline:none;
  border-color:#d4a373;
  box-shadow:0 0 20px rgba(212,163,115,.4);
}

button{
  padding:16px 28px;
  border-radius:40px;
  border:none;
  background:linear-gradient(135deg,#d4a373,#b08968);
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 40px rgba(212,163,115,.4);
}

button:hover{
  transform:translateY(-3px) scale(1.07);
  box-shadow:0 20px 80px rgba(212,163,115,.6);
}

.success{
  margin-top:20px;
  display:none;
  opacity:.8;
}

.instagram{margin-top:40px}
.instagram img{width:140px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.6)}

footer{position:absolute;bottom:20px;font-size:.7rem;opacity:.5}

@media(max-width:600px){
  .logo{width:160px}
  input{min-width:100%}
  .form{flex-direction:column}
  button{width:100%}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
<img src="logo.webp" class="logo" />
<h2>PRÓXIMAMENTE</h2>
<p>Algo único está en camino.<br>Diseñado para quienes miran más allá.</p>

<div class="countdown" id="countdown"></div>

<form class="form" id="form">
<input type="email" id="email" placeholder="Tu correo electrónico" required />
<button>AVÍSAME</button>
</form>

<div class="success" id="success">✔️ Estás dentro. Te avisaremos.</div>

<div class="instagram">
<p>Síguenos en Instagram</p>
<img src="qr.png" />
</div>

<footer>© 2026</footer>
</div>

<script>
// COUNTDOWN
const date=new Date("2026-06-01").getTime();
setInterval(()=>{
const now=new Date().getTime();
const d=date-now;
if(d<0)return document.getElementById('countdown').innerHTML='Ya disponible';
const days=Math.floor(d/(1000*60*60*24));
const h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((d%(1000*60*60))/(1000*60));
document.getElementById('countdown').innerHTML=`${days}d ${h}h ${m}m`;
},1000);

// STARS
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=Array.from({length:120},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*1.2,
  d:Math.random()*0.5
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='white';
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  move();
}

function move(){
  stars.forEach(s=>{
    s.y+=s.d;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,33);

// FORM → FORMSPREE + UX PRO

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const btn = document.querySelector('button');

  btn.innerHTML = 'Enviando...';
  btn.disabled = true;

  try {
    await fetch('https://formspree.io/f/xgorrabn', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email })
    });

    document.getElementById('success').style.display = 'block';
  } catch {
    alert('Error. Inténtalo de nuevo');
  }

  btn.innerHTML = 'AVÍSAME';
  btn.disabled = false;
});

// PARALLAX
window.addEventListener('deviceorientation',e=>{
  const x=e.gamma/30;
  const y=e.beta/50;
  document.querySelector('.bg').style.transform=`scale(1.2) translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
