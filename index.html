<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Próximamente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* FONDO + PARALLAX MOUSE */
.bg{
  position:fixed;
  inset:0;
  background:url('fondo.jpg') center top / cover no-repeat;
  filter:brightness(1.15) contrast(1.2) saturate(1.1);
  transform:scale(1.05);
  transition:transform .2s ease-out;
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.05) 0%,
    rgba(0,0,0,0.25) 40%,
    rgba(0,0,0,0.85) 100%
  );
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  max-width:700px;
  margin:auto;
}

.logo{
  width:300px;
  margin-bottom:10px;
  animation:fadeUp 1.2s ease;
}

h2{
  letter-spacing:8px;
  font-weight:300;
  margin-bottom:10px;
}

.main-copy{
  font-size:1.05rem;
  margin-bottom:20px;
  opacity:.95;
}

.urgency{
  font-size:.8rem;
  letter-spacing:2px;
  margin-bottom:15px;
  opacity:.7;
}

/* CTA DESTACADO */
.form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  width:100%;
}

input{
  padding:16px 20px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.4);
  background:rgba(0,0,0,.5);
  color:#fff;
  width:65%;
}

button{
  padding:16px 28px;
  border-radius:40px;
  border:none;
  background:#c89b5a;
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
  animation:pulse 2.5s infinite;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 15px 60px rgba(200,155,90,.7);
}

@keyframes pulse{
  0%{box-shadow:0 0 0 rgba(200,155,90,0)}
  50%{box-shadow:0 0 40px rgba(200,155,90,.4)}
  100%{box-shadow:0 0 0 rgba(200,155,90,0)}
}

.success{
  margin-top:15px;
  display:none;
}

.note{
  font-size:.75rem;
  opacity:.6;
  margin-top:10px;
}

/* FEATURES */
.features{
  margin-top:50px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.feature{
  opacity:0;
  transform:translateY(30px);
  transition:.6s ease;
}

.feature.visible{
  opacity:1;
  transform:translateY(0);
}

.feature svg{
  margin-bottom:10px;
  transition:.4s;
}

.feature:hover svg{
  transform:scale(1.2);
  filter:drop-shadow(0 10px 25px rgba(200,155,90,.5));
}

footer{
  margin-top:40px;
  font-size:.7rem;
  opacity:.5;
}

@media(max-width:600px){
  input{width:100%}
  button{width:100%}
  .form{flex-direction:column}
  .features{grid-template-columns:1fr}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="logo.webp" class="logo">

<h2>PRÓXIMAMENTE</h2>

<div class="main-copy">Acceso anticipado a algo que no será público.</div>

<div class="urgency">SÉ DE LOS PRIMEROS</div>

<form class="form" id="form">
<input type="email" id="email" placeholder="Introduce tu email" required>
<button>ACCEDER</button>
</form>

<div class="success" id="success">✔️ Acceso reservado</div>

<div class="note">Sin spam. Solo acceso anticipado.</div>

<div class="features">

<div class="feature">
<svg width="40" height="40" stroke="#c89b5a" fill="none" stroke-width="2"><polygon points="12 2 15 9 22 9 17 14 19 21 12 17 5 21 7 14 2 9 9 9"></polygon></svg>
<h4>INSPIRACIÓN</h4>
<p>Creamos con propósito.</p>
</div>

<div class="feature">
<svg width="40" height="40" stroke="#c89b5a" fill="none" stroke-width="2"><path d="M12 2C8 8 5 10 5 14a7 7 0 0 0 14 0c0-4-3-6-7-12z"></path></svg>
<h4>CALIDAD</h4>
<p>Detalles que marcan la diferencia.</p>
</div>

<div class="feature">
<svg width="40" height="40" stroke="#c89b5a" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"></circle></svg>
<h4>VISIÓN</h4>
<p>Miramos hacia el futuro.</p>
</div>

</div>

<footer>© 2026</footer>

</div>

<script>

// PARALLAX MOUSE
window.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-0.5)*10;
  const y=(e.clientY/window.innerHeight-0.5)*10;
  document.getElementById('bg').style.transform=`scale(1.05) translate(${x}px,${y}px)`;
});

// FORM

document.getElementById('form').addEventListener('submit', async e=>{
  e.preventDefault();
  const email=document.getElementById('email').value;
  const btn=document.querySelector('button');
  btn.innerHTML='Accediendo...';
  btn.disabled=true;
  await fetch('https://formspree.io/f/xgorrabn',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  document.getElementById('success').style.display='block';
  btn.innerHTML='ACCEDER';
  btn.disabled=false;
});

// APARICIÓN FEATURES
const features=document.querySelectorAll('.feature');
const obs=new IntersectionObserver(entries=>{
 entries.forEach(e=>{
  if(e.isIntersecting) e.target.classList.add('visible');
 });
},{threshold:0.2});
features.forEach(f=>obs.observe(f));

</script>

</body>
</html>
