<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Próximamente</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:#fff;
      height:100vh;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:url('fondo.jpg') center/cover no-repeat;
      transform:scale(1.1);
      animation:slowZoom 30s ease-in-out infinite alternate;
    }

    @keyframes slowZoom{
      from{transform:scale(1.1)}
      to{transform:scale(1.2)}
    }

    .overlay{
      position:fixed;
      inset:0;
      background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.85));
      backdrop-filter:blur(6px);
    }

    .container{
      position:relative;
      z-index:2;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      animation:fadeIn 1.5s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    .logo{
      width:220px;
      margin-bottom:30px;
    }

    h2{
      letter-spacing:6px;
      font-weight:300;
      margin-bottom:20px;
    }

    p{
      opacity:.85;
      margin-bottom:30px;
    }

    .countdown{
      font-size:1.2rem;
      margin-bottom:30px;
      letter-spacing:2px;
      opacity:.8;
    }

    .form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    input{
      padding:14px 18px;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.05);
      color:#fff;
      min-width:250px;
    }

    button{
      padding:14px 24px;
      border-radius:30px;
      border:none;
      background:linear-gradient(135deg,#d4a373,#b08968);
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{transform:scale(1.05)}

    .note{
      font-size:.8rem;
      opacity:.6;
      margin-top:10px;
    }

    .instagram{
      margin-top:40px;
    }

    .instagram img{
      width:150px;
      border-radius:20px;
      margin:10px 0;
    }

    .ig-btn{
      display:inline-block;
      padding:10px 18px;
      border:1px solid rgba(255,255,255,.3);
      border-radius:30px;
      color:#fff;
      text-decoration:none;
      transition:.3s;
    }

    .ig-btn:hover{background:rgba(255,255,255,.1)}

    footer{
      position:absolute;
      bottom:20px;
      font-size:.7rem;
      opacity:.5;
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <img src="logo.png" class="logo" />

  <h2>PRÓXIMAMENTE</h2>

  <p>Algo único está en camino.<br>Diseñado para quienes miran más allá.</p>

  <div class="countdown" id="countdown"></div>

  <form class="form" id="form">
    <input type="email" id="email" placeholder="Tu correo electrónico" required />
    <button type="submit">AVÍSAME</button>
  </form>

  <div class="note" id="msg">No compartiremos tu información.</div>

  <div class="instagram">
    <p>Síguenos en Instagram</p>
    <img src="qr.png" />
    <br>
    <a class="ig-btn" href="https://instagram.com/miradalt" target="_blank">Seguir</a>
  </div>

  <footer>© 2026</footer>

</div>

<script>
// COUNTDOWN
const date = new Date("2026-06-01").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const d = date - now;
  if(d<0) return document.getElementById('countdown').innerHTML='Ya disponible';
  const days=Math.floor(d/(1000*60*60*24));
  const h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((d%(1000*60*60))/(1000*60));
  document.getElementById('countdown').innerHTML=`${days}d ${h}h ${m}m`;
},1000);

// FORM (Cloudflare Worker endpoint recomendado)
document.getElementById('form').addEventListener('submit', async e=>{
  e.preventDefault();
  const email=document.getElementById('email').value;
  const msg=document.getElementById('msg');

  try{
    await fetch('https://TU-WORKER-URL',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });

    msg.innerHTML='✔️ Gracias. Te avisaremos.';
  }catch{
    msg.innerHTML='Error. Inténtalo luego.';
  }
});
</script>

</body>
</html>
